name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 👈 必须

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 👇 登录 GHCR（不用 DockerHub）
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/dockerify-android" >> $GITHUB_ENV

      - name: Get current date
        if: github.ref == 'refs/heads/main'
        run: echo "DATE=$(date +'%d-%m-%y')" >> $GITHUB_ENV

      - name: Get Pull Request ID
        if: github.event_name == 'pull_request'
        run: echo "PR_ID=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64   # 👈 只构建 AMD64
          tags: |
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.IMAGE_NAME) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:{1}', env.IMAGE_NAME, env.DATE) || '' }}
            ${{ github.event_name == 'pull_request' && format('{0}:pr-{1}', env.IMAGE_NAME, env.PR_ID) || '' }}
